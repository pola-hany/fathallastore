<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح الله - الأجهزة المنزلية والإلكترونيات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-store"></i>
                <span id="storeName"></span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active" id="homeLink"></a>
                <a href="#products" id="productsLink"></a>
                <button class="lang-btn" id="langToggle">
                    <i class="fas fa-globe"></i> English
                </button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-badge">
                    <i class="fas fa-tag"></i>
                    <span id="sinceBadge"></span>
                </div>
                <h1 id="heroTitle"></h1>
                <p id="heroDesc"></p>
                <div class="hero-features">
                    <span><i class="fas fa-check-circle"></i> <span id="feature1"></span></span>
                    <span><i class="fas fa-truck"></i> <span id="feature2"></span></span>
                    <span><i class="fas fa-headset"></i> <span id="feature3"></span></span>
                </div>
                <a href="#products" class="btn-primary" id="shopBtn"></a>
            </div>
        </div>
    </section>

    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="">
            </div>
            <div class="filters">
                <select id="categoryFilter">
                    <option value="all" id="allCategories"></option>
                    <option value="phones" id="phonesCat"></option>
                    <option value="laptops" id="laptopsCat"></option>
                    <option value="tvs" id="tvsCat"></option>
                    <option value="appliances" id="appliancesCat"></option>
                    <option value="accessories" id="accessoriesCat"></option>
                </select>
                <select id="priceFilter">
                    <option value="all" id="allPrices"></option>
                    <option value="0-2000">أقل من 2000</option>
                    <option value="2000-5000">2000 - 5000</option>
                    <option value="5000-10000">5000 - 10000</option>
                    <option value="10000-20000">10000 - 20000</option>
                    <option value="20000-50000">20000 - 50000</option>
                    <option value="50000+">أكثر من 50000</option>
                </select>
            </div>
        </div>
    </section>

    <section class="products" id="products">
        <div class="container">
            <div class="section-header">
                <h2 id="featuredTitle"></h2>
                <p id="featuredDesc"></p>
            </div>
            <div id="products-container"></div>
        </div>
    </section>

    <section class="features-section">
        <div class="container">
            <div class="features-grid">
                <div class="feature-card">
                    <i class="fas fa-medal"></i>
                    <h3 id="qualityTitle"></h3>
                    <p id="qualityDesc"></p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-wallet"></i>
                    <h3 id="priceTitle"></h3>
                    <p id="priceDesc"></p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-clock"></i>
                    <h3 id="warrantyTitle"></h3>
                    <p id="warrantyDesc"></p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-truck-fast"></i>
                    <h3 id="deliveryTitle"></h3>
                    <p id="deliveryDesc"></p>
                </div>
            </div>
        </div>
    </section>

    <button id="backToTop" class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <div class="footer-logo">
                        <i class="fas fa-store"></i>
                        <span>فتح الله</span>
                    </div>
                    <p id="footerDesc"></p>
                </div>
                <div class="footer-links">
                    <h4 id="quickLinks"></h4>
                    <a href="index.html" id="footerHome"></a>
                    <a href="#products" id="footerProducts"></a>
                </div>
                <div class="footer-contact">
                    <h4 id="contactUs"></h4>
                    <p><i class="fas fa-phone"></i> 15260</p>
                    <p><i class="fas fa-envelope"></i> contact@fathalla.com</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p id="copyright"></p>
            </div>
        </div>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
