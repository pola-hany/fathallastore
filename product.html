<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح الله - تفاصيل المنتج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-detail-container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--border-light);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        .product-detail-gallery { padding: 30px; background: var(--bg-light); }
        .main-image { width: 100%; height: 400px; object-fit: contain; border-radius: 20px; background: white; }
        .thumbnail-gallery { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; margin-top: 20px; }
        .thumbnail { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .thumbnail:hover, .thumbnail.active { border-color: var(--primary); transform: scale(1.05); }
        .product-detail-info { padding: 30px; }
        .product-detail-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; color: var(--secondary); }
        .product-detail-price { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; }
        .specs-section { margin: 30px 0; background: var(--bg-light); padding: 20px; border-radius: 15px; }
        .specs-section h3 { margin-bottom: 20px; color: var(--secondary); }
        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .spec-item { display: flex; justify-content: space-between; padding: 12px; background: white; border-radius: 12px; border: 1px solid var(--border-light); }
        .spec-label { font-weight: 700; color: var(--primary); }
        .product-description { margin-top: 20px; line-height: 1.8; color: #555; }
        .url-section { margin-top: 30px; padding: 20px; background: var(--bg-light); border-radius: 15px; border: 1px solid var(--border-light); }
        .url-section h3 { color: var(--primary); margin-bottom: 15px; }
        .url-box { display: flex; gap: 10px; margin-top: 10px; }
        .url-box input { flex: 1; padding: 12px; border: 1px solid var(--border-light); border-radius: 10px; font-family: monospace; background: white; }
        .copy-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; }
        @media (max-width: 768px) {
            .product-detail-container { grid-template-columns: 1fr; }
            .main-image { height: 250px; }
            .url-box { flex-direction: column; }
            .copy-btn { padding: 10px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><i class="fas fa-store"></i><span id="storeName"></span></div>
            <div class="nav-links">
                <a href="index.html" id="homeLink"></a>
                <button class="lang-btn" id="langToggle"><i class="fas fa-globe"></i> English</button>
            </div>
        </div>
    </nav>
    <section class="product-detail"><div class="container"><div id="product-content" class="loading">جاري تحميل المنتج...</div></div></section>
    <button id="backToTop" class="back-to-top"><i class="fas fa-arrow-up"></i></button>
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-info"><div class="footer-logo"><i class="fas fa-store"></i><span>فتح الله</span></div><p id="footerDesc"></p></div>
                <div class="footer-links"><h4 id="quickLinks"></h4><a href="index.html" id="footerHome"></a></div>
                <div class="footer-contact"><h4 id="contactUs"></h4><p><i class="fas fa-phone"></i> 15260</p><p><i class="fas fa-envelope"></i> contact@fathalla.com</p></div>
            </div>
            <div class="footer-bottom"><p id="copyright"></p></div>
        </div>
    </footer>
    <script src="js/translations.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
